<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BeatCat MBTI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#F2F4F8;font-family:'Nunito',sans-serif;color:#222;touch-action:manipulation;}
button{cursor:pointer;font-family:'Nunito',sans-serif;border:none;outline:none;background:none;}

#app{
  display:flex;flex-direction:column;
  height:100%;max-width:430px;margin:0 auto;
  padding:12px 12px 8px;gap:8px;
}

#hd{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:0 2px;}
.hd-logo{font-size:18px;font-weight:900;color:#1A1A2E;letter-spacing:-.02em;}
.hd-logo em{color:#E8584C;font-style:normal;}
.hd-sub{font-size:10px;font-weight:800;color:#AAB;}

#group-tabs{display:flex;gap:6px;flex-shrink:0;}
.gtab{
  flex:1;padding:7px 4px;border-radius:11px;
  background:#fff;color:#AAB;
  border:1.5px solid #E8ECF4;
  transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.gtab .ge{font-size:15px;}
.gtab .gl{font-size:10px;font-weight:900;}
.gtab.on{border-color:transparent;color:#fff;}
.gtab.on.NT{background:#E8584C;box-shadow:0 3px 10px rgba(232,88,76,.35);}
.gtab.on.NF{background:#F5A623;box-shadow:0 3px 10px rgba(245,166,35,.35);}
.gtab.on.SJ{background:#4A90D9;box-shadow:0 3px 10px rgba(74,144,217,.35);}
.gtab.on.SP{background:#5BAD6F;box-shadow:0 3px 10px rgba(91,173,111,.35);}

#type-tabs{display:flex;gap:6px;flex-shrink:0;}
.ttab{
  flex:1;padding:6px 2px;border-radius:10px;
  font-size:12px;font-weight:900;
  background:#fff;color:#888;
  border:1.5px solid #E8ECF4;
  transition:all .15s;text-align:center;
}
.ttab.on{color:#fff;border-color:transparent;background:#2D2D2D;}

#main-card{
  flex:1;border-radius:22px;
  display:flex;flex-direction:column;
  overflow:hidden;background:#fff;
  box-shadow:0 4px 24px rgba(0,0,0,.10);
  min-height:0;
}

#card-img-wrap{
  flex:1;overflow:hidden;min-height:0;
  background:#fff;display:flex;align-items:center;justify-content:center;
}
#card-img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;padding:10px 10px 0;
}

#bottom-panel{
  flex-shrink:0;
  border-top:1.5px solid #F0F2F5;
  padding:10px 14px 12px;
  display:flex;flex-direction:column;gap:8px;
}

.song-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:12px;
}
.NT .song-row{background:#FFF0EF;}
.NF .song-row{background:#FFF8EC;}
.SJ .song-row{background:#EFF6FF;}
.SP .song-row{background:#F0FDF4;}

.song-icon{font-size:18px;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-label{font-size:9px;font-weight:900;letter-spacing:.1em;color:#CCC;text-transform:uppercase;margin-bottom:2px;}
.song-name{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.NT .song-name{color:#C0392B;} .NF .song-name{color:#B5720A;}
.SJ .song-name{color:#2563EB;} .SP .song-name{color:#16A34A;}

.play-btn{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:9px;
  font-size:12px;font-weight:900;color:#fff;
  transition:all .15s;
}
.NT .play-btn{background:#E8584C;} .NF .play-btn{background:#F5A623;}
.SJ .play-btn{background:#4A90D9;} .SP .play-btn{background:#5BAD6F;}
.play-btn:disabled{background:#DDD;color:#AAA;}
.play-btn:active{transform:scale(.95);}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#fff;}
.playing .pulse{animation:blink .7s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.55);}}

.prog-wrap{display:none;}
.prog-wrap.show{display:block;}
.prog-meta{display:flex;justify-content:space-between;font-size:9px;font-weight:800;color:#BBB;margin-bottom:4px;}
.prog-bar{width:100%;height:3px;background:#EEE;border-radius:2px;overflow:hidden;cursor:pointer;}
.prog-fill{height:100%;border-radius:2px;width:0%;transition:width .2s linear;}
.NT .prog-fill{background:#E8584C;} .NF .prog-fill{background:#F5A623;}
.SJ .prog-fill{background:#4A90D9;} .SP .prog-fill{background:#5BAD6F;}

.action-row{display:flex;gap:8px;align-items:stretch;}
.sol-box{
  flex:1;background:#F7F8FA;border-radius:11px;
  padding:9px 11px;overflow:hidden;
}
.sol-label{font-size:9px;font-weight:900;letter-spacing:.08em;color:#CCC;text-transform:uppercase;margin-bottom:4px;}
.sol-text{font-size:11.5px;font-weight:800;color:#444;line-height:1.5;}
.mat-btn{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:9px 13px;border-radius:11px;
  font-size:10px;font-weight:900;
  background:#EBF4FF;color:#2563EB;
  transition:all .15s;min-width:64px;
}
.mat-btn:disabled{background:#F5F5F5;color:#CCC;}
.mat-btn:active{transform:scale(.95);}
.mat-btn .mi{font-size:18px;}

#nav{display:flex;align-items:center;justify-content:space-between;padding:0 4px;flex-shrink:0;}
.nav-btn{
  width:36px;height:36px;border-radius:50%;
  background:#fff;border:1.5px solid #E8ECF4;
  font-size:17px;font-weight:900;color:#888;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.nav-btn:not([disabled]):active{transform:scale(.85);}
.nav-btn[disabled]{opacity:.2;}
.nav-pips{display:flex;gap:5px;align-items:center;}
.pip{width:6px;height:6px;border-radius:50%;background:#DDD;transition:all .22s;}
.pip.on{width:20px;border-radius:3px;}
.NT .pip.on{background:#E8584C;} .NF .pip.on{background:#F5A623;}
.SJ .pip.on{background:#4A90D9;} .SP .pip.on{background:#5BAD6F;}
</style>
</head>
<body>
<div id="app">
  <div id="hd">
    <div class="hd-logo">BeatCat <em>MBTI</em> 🐱</div>
    <div class="hd-sub">교사 유형별 수업 활동 카드</div>
  </div>
  <div id="group-tabs"></div>
  <div id="type-tabs"></div>

  <div id="main-card" class="NT">
    <div id="card-img-wrap">
      <img id="card-img" src="" alt="">
    </div>
    <div id="bottom-panel">
      <div class="song-row">
        <div class="song-icon">🎵</div>
        <div class="song-info">
          <div class="song-label">추천 음원</div>
          <div class="song-name" id="song-name">음원 미등록</div>
        </div>
        <button class="play-btn" id="audio-btn" disabled>
          <span class="pulse"></span>
          <span id="play-label">없음</span>
        </button>
      </div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-meta">
          <span id="prog-title">🎵 재생 중</span>
          <span id="prog-time">0:00 / 0:00</span>
        </div>
        <div class="prog-bar" onclick="seekAudio(event)">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
      </div>
      <div class="action-row">
        <div class="sol-box">
          <div class="sol-label">💬 솔루션</div>
          <div class="sol-text" id="bc-sol"></div>
        </div>
        <button class="mat-btn" id="material-btn" disabled>
          <span class="mi">📎</span>교구
        </button>
      </div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn" id="nav-prev" onclick="prev()">‹</button>
    <div class="nav-pips" id="nav-pips"></div>
    <button class="nav-btn" id="nav-next" onclick="nxt()">›</button>
  </div>
</div>

<script>
let ASSETS={};
async function loadAssets(){
  try{const res=await fetch('./mbti-assets.json');if(res.ok)ASSETS=await res.json();}
  catch(e){}
  renderAll();
}

const D={
  NT:{label:'NT 전략형',emoji:'🔴',types:{
    INTJ:{solution:'"좋아, 이건 미션이야— Step 1부터 하나씩 깨보자!"'},
    INTP:{solution:'"왜 그럴까? 우리 같이 이유를 찾아보자!"'},
    ENTJ:{solution:'"마침표·물음표 역할 팀경기 미션— 이긴 팀이 보너스 포인트!"'},
    ENTP:{solution:'"노란불! Wait~ I have an Idea!"'},
  }},
  NF:{label:'NF 공감형',emoji:'🟡',types:{
    INFJ:{solution:'"지금부터 우리가 주인공이야— 이 문제를 함께 해결해보자"'},
    INFP:{solution:'"이걸 너만의 방식으로 표현해볼래?"'},
    ENFJ:{solution:'"우리 다 같이 해보자! 서로 도와주면서!"'},
    ENFP:{solution:'"와 재밌다! 한 번 더! 더 크게 해보자!"'},
  }},
  SJ:{label:'SJ 안정형',emoji:'🔵',types:{
    ISTJ:{solution:'"좋아, 같은 방식으로 한 번 더 반복해보자"'},
    ISFJ:{solution:'"괜찮아, 천천히 해도 돼— 선생님이 같이 할게"'},
    ESTJ:{solution:'"규칙 기억! 지금은 차례 지켜서 진행한다!"'},
    ESFJ:{solution:'"와 너무 잘했어! 친구들도 같이 박수!"'},
  }},
  SP:{label:'SP 활동형',emoji:'🟢',types:{
    ISTP:{solution:'"말 말고 직접 해보자— 손으로 해보면 바로 알 수 있어"'},
    ISFP:{solution:'"느낌대로 해도 좋아— 자유롭게 만들어봐"'},
    ESTP:{solution:'"발화 후 레이스! Go Go Friend!!"'},
    ESFP:{solution:'"좋아! 지금부터 무대야— 멋지게 보여줘!"'},
  }},
};

const GK=['NT','NF','SJ','SP'];
let cg='NT',ci=0,audioEl=null,isPlaying=false;
function tkeys(g){return Object.keys(D[g].types);}
function ct(){return tkeys(cg)[ci];}

function renderGroupTabs(){
  const el=document.getElementById('group-tabs');el.innerHTML='';
  GK.forEach(g=>{
    const b=document.createElement('button');
    b.className='gtab'+(g===cg?' on '+g:'');
    b.innerHTML=`<span class="ge">${D[g].emoji}</span><span class="gl">${g}</span>`;
    b.onclick=()=>{stopAudio();cg=g;ci=0;renderAll();};
    el.appendChild(b);
  });
}
function renderTypeTabs(){
  const el=document.getElementById('type-tabs');el.innerHTML='';
  tkeys(cg).forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='ttab'+(i===ci?' on':'');
    b.textContent=t;
    b.onclick=()=>{stopAudio();ci=i;renderAll();};
    el.appendChild(b);
  });
}
function renderBody(){
  const g=cg,tk=ct(),td=D[g].types[tk];
  const asset=ASSETS[tk]||null;
  const hasAudio=!!(asset&&asset.audio);
  const hasMaterial=!!(asset&&asset.material);

  document.getElementById('main-card').className=g;
  document.getElementById('card-img').src=`./cards/${tk}.jpg`;
  document.getElementById('song-name').textContent=hasAudio?asset.audio.name:'음원 미등록';

  const aBtn=document.getElementById('audio-btn');
  aBtn.disabled=!hasAudio;
  aBtn.classList.remove('playing');
  document.getElementById('play-label').textContent=hasAudio?'재생':'없음';
  aBtn.onclick=hasAudio?()=>toggleAudio(asset.audio.path,asset.audio.name):null;

  const mBtn=document.getElementById('material-btn');
  mBtn.disabled=!hasMaterial;
  mBtn.onclick=hasMaterial?()=>downloadMaterial(asset.material.path,asset.material.name):null;

  document.getElementById('bc-sol').textContent=td.solution;
  document.getElementById('nav-pips').className='nav-pips '+g;
}
function renderPips(){
  const ts=tkeys(cg);
  const el=document.getElementById('nav-pips');
  el.className='nav-pips '+cg;
  el.innerHTML=ts.map((_,i)=>`<div class="pip${i===ci?' on':''}"></div>`).join('');
  document.getElementById('nav-prev').disabled=ci===0;
  document.getElementById('nav-next').disabled=ci===ts.length-1;
}
function renderAll(){renderGroupTabs();renderTypeTabs();renderBody();renderPips();}

function stopAudio(){
  if(audioEl){audioEl.pause();audioEl=null;}
  isPlaying=false;
  const w=document.getElementById('prog-wrap');if(w)w.classList.remove('show');
  const btn=document.getElementById('audio-btn');
  if(btn){btn.classList.remove('playing');const pl=document.getElementById('play-label');if(pl)pl.textContent='재생';}
}
function toggleAudio(path,name){
  if(isPlaying){stopAudio();return;}
  audioEl=new Audio(path);
  audioEl.addEventListener('timeupdate',()=>{
    if(!audioEl)return;
    const pct=audioEl.duration?(audioEl.currentTime/audioEl.duration*100):0;
    const f=document.getElementById('prog-fill'),t=document.getElementById('prog-time');
    if(f)f.style.width=pct+'%';
    if(t)t.textContent=`${fmt(audioEl.currentTime)} / ${fmt(audioEl.duration||0)}`;
  });
  audioEl.addEventListener('ended',stopAudio);
  audioEl.addEventListener('error',()=>{alert('음원을 찾을 수 없습니다.\n경로: '+path);stopAudio();});
  audioEl.play().then(()=>{
    isPlaying=true;
    const btn=document.getElementById('audio-btn');
    if(btn){btn.classList.add('playing');document.getElementById('play-label').textContent='정지';}
    const w=document.getElementById('prog-wrap');if(w)w.classList.add('show');
    const pt=document.getElementById('prog-title');if(pt)pt.textContent='🎵 '+name;
  }).catch(e=>{alert('재생 오류: '+e.message);stopAudio();});
}
function seekAudio(e){if(!audioEl||!audioEl.duration)return;audioEl.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*audioEl.duration;}
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec.toString().padStart(2,'0')}`;}
function downloadMaterial(path,name){const a=document.createElement('a');a.href=path;a.download=name;a.target='_blank';a.click();}

function prev(){if(ci>0){stopAudio();ci--;renderAll();}}
function nxt(){if(ci<tkeys(cg).length-1){stopAudio();ci++;renderAll();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nxt();if(e.key==='ArrowLeft')prev();});

let _sx=0;
document.getElementById('main-card').addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;},{passive:true});
document.getElementById('main-card').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_sx;
  if(Math.abs(dx)>50){dx<0?nxt():prev();}
});

loadAssets();
</script>
</body>
</html>
